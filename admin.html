<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Apsaras Ammu</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    
    <nav class="glass-nav">
        <div class="container nav-container">
            <a href="/index.html" class="logo">
                <i data-lucide="sparkles" class="gold-text"></i>
                APSARAS
            </a>
            <div class="nav-links">
                <a href="/index.html" class="nav-link"><i data-lucide="sparkles"></i> Home</a>
                <a href="/services.html" class="nav-link"><i data-lucide="scissors"></i> Services</a>
                <a href="/book.html" class="nav-link"><i data-lucide="calendar"></i> Book</a>
                <a href="/admin.html" class="nav-link active"><i data-lucide="user-cog"></i> Admin</a>
            </div>
        </div>
    </nav>

    <main>
        <div class="container" style="padding-top: 5rem; padding-bottom: 5rem;">
            
            <!-- Login View -->
            <div id="login-view" class="reveal" style="max-width: 450px; margin: 5rem auto;">
                <div class="glass-panel" style="padding: 4rem; text-align: center;">
                    <i data-lucide="lock" class="gold-text" style="width: 48px; height: 48px; margin-bottom: 2rem;"></i>
                    <h2 style="margin-bottom: 2rem;">Secure Access</h2>
                    <form id="login-form">
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Enter Dashboard</button>
                    </form>
                    <p id="login-error" style="display: none; color: var(--accent-rose); font-size: 0.85rem; margin-top: 1.5rem;"></p>
                </div>
            </div>

            <!-- Dashboard View -->
            <div id="dashboard-view" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 4rem;" class="reveal">
                    <div>
                        <span class="hero-subtitle">Management</span>
                        <h2 class="section-title" style="margin-bottom: 0;">Bookings <span class="gradient-text">Overview</span></h2>
                    </div>
                    <button id="logout-btn" class="btn btn-outline" style="padding: 0.6rem 1.25rem; font-size: 0.8rem;">
                        <i data-lucide="log-out" style="width: 16px; margin-right: 0.5rem;"></i> Exit
                    </button>
                </div>

                <div class="glass-panel reveal delay-1" style="overflow: hidden;">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Customer</th>
                                <th>Phone</th>
                                <th>Date & Time</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="bookings-tbody">
                            <!-- Injected -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginView = document.getElementById('login-view');
            const dashboardView = document.getElementById('dashboard-view');
            const loginForm = document.getElementById('login-form');
            const tbody = document.getElementById('bookings-tbody');
            
            let token = localStorage.getItem('adminToken');

            if (token) showDashboard();

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const password = document.getElementById('password').value;
                
                fetch(`${API_BASE_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                })
                .then(res => {
                    if (!res.ok) throw new Error();
                    return res.json();
                })
                .then(data => {
                    token = data.token;
                    localStorage.setItem('adminToken', token);
                    showDashboard();
                })
                .catch(() => {
                    const err = document.getElementById('login-error');
                    err.textContent = 'Invalid credentials.';
                    err.style.display = 'block';
                });
            });

            document.getElementById('logout-btn').addEventListener('click', () => {
                localStorage.removeItem('adminToken');
                window.location.reload();
            });

            function showDashboard() {
                loginView.style.display = 'none';
                dashboardView.style.display = 'block';
                fetchBookings();
            }

            function fetchBookings() {
                fetch(`${API_BASE_URL}/api/bookings`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                .then(res => res.json())
                .then(data => {
                    tbody.innerHTML = '';
                    data.forEach(booking => {
                        const date = new Date(booking.appointmentDate).toLocaleString('en-IN', {
                            dateStyle: 'medium',
                            timeStyle: 'short'
                        });
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><div style="font-weight: 500;">${booking.customerName}</div></td>
                            <td><div style="color: var(--text-muted); font-size: 0.9rem;">${booking.phoneNumber}</div></td>
                            <td>${date}</td>
                            <td><span class="status-badge status-${booking.status.toLowerCase()}">${booking.status}</span></td>
                            <td>
                                ${booking.status === 'Pending' ? `
                                    <div style="display: flex; gap: 0.75rem;">
                                        <button onclick="updateStatus('${booking._id}', 'Completed')" class="btn btn-outline" style="padding: 0.4rem; border-radius: 4px; border-color: #2ecc7122; color: #2ecc71;"><i data-lucide="check" style="width: 16px;"></i></button>
                                        <button onclick="updateStatus('${booking._id}', 'Cancelled')" class="btn btn-outline" style="padding: 0.4rem; border-radius: 4px; border-color: #e74c3c22; color: #e74c3c;"><i data-lucide="x" style="width: 16px;"></i></button>
                                    </div>
                                ` : '-'}
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                    lucide.createIcons();
                });
            }

            window.updateStatus = (id, status) => {
                fetch(`${API_BASE_URL}/api/bookings/${id}/status`, {
                    method: 'PATCH',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status })
                }).then(() => fetchBookings());
            }
        });
    </script>
</body>
</html>
