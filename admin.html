<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Apsaras Ammu</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .nav-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-main);
      font-weight: 400;
      border-bottom: 2px solid transparent;
      padding-bottom: 0.25rem;
      transition: all 0.3s ease;
    }
    .nav-link.active, .nav-link:hover {
      color: var(--accent-gold);
      border-bottom: 2px solid var(--accent-gold);
    }
    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .status-Pending {
      background: rgba(212, 175, 55, 0.2);
      color: var(--accent-gold);
    }
    .status-Completed {
      background: rgba(46, 204, 113, 0.2);
      color: #2ecc71;
    }
    .status-Cancelled {
      background: rgba(231, 76, 60, 0.2);
      color: #e74c3c;
    }
    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 4px;
      transition: background 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .action-btn:hover {
      background: rgba(255,255,255,0.1);
    }
    .action-complete { color: #2ecc71; }
    .action-cancel { color: #e74c3c; }
  </style>
</head>
<body>
  
  <nav class="glass-nav">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; height: 80px;">
      <a href="/" style="display: flex; align-items: center; gap: 0.5rem; border: none;">
        <i data-lucide="sparkles" color="var(--accent-gold)" style="width: 28px; height: 28px;"></i>
        <h1 style="margin: 0; font-size: 1.5rem; letter-spacing: 1px; color: var(--text-main);">Apsaras</h1>
      </a>
      <div style="display: flex; gap: 2rem;">
        <a href="/index.html" class="nav-link"><i data-lucide="sparkles" style="width: 18px; height: 18px;"></i> Home</a>
        <a href="/services.html" class="nav-link"><i data-lucide="scissors" style="width: 18px; height: 18px;"></i> Services</a>
        <a href="/book.html" class="nav-link"><i data-lucide="calendar" style="width: 18px; height: 18px;"></i> Book</a>
        <a href="/admin.html" class="nav-link"><i data-lucide="user-cog" style="width: 18px; height: 18px;"></i> Admin</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="container animate-fade-in" style="padding: 4rem 2rem;">
      
      <!-- Login Section -->
      <div id="login-section" class="glass-panel" style="max-width: 400px; margin: 0 auto; padding: 3rem; text-align: center;">
        <i data-lucide="lock" color="var(--accent-gold)" style="width: 48px; height: 48px; margin-bottom: 1rem;"></i>
        <h2 style="margin-bottom: 2rem;">Admin Login</h2>
        <form id="login-form" style="display: flex; flex-direction: column; gap: 1rem;">
          <input type="password" id="password" class="form-control" placeholder="Enter Admin Password" required>
          <div id="login-error" style="display: none; color: var(--accent-rose); font-size: 0.9rem;"></div>
          <button type="submit" class="btn btn-primary" id="login-btn">Login</button>
        </form>
      </div>

      <!-- Dashboard Section -->
      <div id="dashboard-section" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
          <h2>Bookings <span style="color: var(--text-main);">Dashboard</span></h2>
          <button id="logout-btn" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.9rem; gap: 0.5rem;">
            <i data-lucide="log-out" style="width: 16px; height: 16px;"></i> Logout
          </button>
        </div>

        <div class="glass-panel" style="overflow-x: auto;">
          <table id="bookings-table">
            <thead>
              <tr>
                <th>Customer</th>
                <th>Phone</th>
                <th>Date & Time</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="bookings-body">
              <tr>
                <td colspan="5" style="text-align: center; padding: 2rem; color: var(--text-muted);">Loading bookings...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginSection = document.getElementById('login-section');
      const dashboardSection = document.getElementById('dashboard-section');
      const loginForm = document.getElementById('login-form');
      const loginError = document.getElementById('login-error');
      const logoutBtn = document.getElementById('logout-btn');
      const tbody = document.getElementById('bookings-body');
      
      let token = localStorage.getItem('adminToken');

      if (token) {
        showDashboard();
      }

      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('login-btn');
        btn.disabled = true;
        btn.textContent = 'Verifying...';
        loginError.style.display = 'none';

        fetch(`${API_BASE_URL}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        })
        .then(res => {
          if (!res.ok) throw new Error('Invalid password');
          return res.json();
        })
        .then(data => {
          token = data.token;
          localStorage.setItem('adminToken', token);
          document.getElementById('password').value = '';
          showDashboard();
        })
        .catch(err => {
          loginError.textContent = 'Invalid password. Please try again.';
          loginError.style.display = 'block';
        })
        .finally(() => {
          btn.disabled = false;
          btn.textContent = 'Login';
        });
      });

      logoutBtn.addEventListener('click', () => {
        localStorage.removeItem('adminToken');
        token = null;
        dashboardSection.style.display = 'none';
        loginSection.style.display = 'block';
      });

      function showDashboard() {
        loginSection.style.display = 'none';
        dashboardSection.style.display = 'block';
        fetchBookings();
      }

      function fetchBookings() {
        fetch(`${API_BASE_URL}/api/bookings`, {
          headers: { 'Authorization': `Bearer ${token}` }
        })
        .then(res => {
          if (res.status === 401) {
            logoutBtn.click();
            throw new Error('Unauthorized');
          }
          return res.json();
        })
        .then(data => {
          if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--text-muted);">No bookings found.</td></tr>';
            return;
          }

          tbody.innerHTML = '';
          data.forEach(booking => {
            const date = new Date(booking.appointmentDate).toLocaleString();
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${booking.customerName}</td>
              <td>${booking.phoneNumber}</td>
              <td>${date}</td>
              <td><span class="status-badge status-${booking.status}">${booking.status}</span></td>
              <td>
                ${booking.status === 'Pending' ? `
                  <button class="action-btn action-complete" onclick="updateStatus('${booking._id}', 'Completed')" title="Mark Completed">
                    <i data-lucide="check-circle" style="width: 20px; height: 20px;"></i>
                  </button>
                  <button class="action-btn action-cancel" onclick="updateStatus('${booking._id}', 'Cancelled')" title="Cancel">
                    <i data-lucide="x-circle" style="width: 20px; height: 20px;"></i>
                  </button>
                ` : ''}
              </td>
            `;
            tbody.appendChild(tr);
          });
          lucide.createIcons();
        })
        .catch(console.error);
      }

      window.updateStatus = function(id, status) {
        fetch(`${API_BASE_URL}/api/bookings/${id}/status`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ status })
        })
        .then(() => fetchBookings())
        .catch(console.error);
      }
    });
  </script>
</body>
</html>
