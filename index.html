<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apsaras Ammu | Premium Beauty Salon</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    
    <nav class="glass-nav">
        <div class="container nav-container">
            <a href="/index.html" class="logo">
                <i data-lucide="sparkles" class="gold-text"></i>
                APSARAS
            </a>
            <div class="nav-links">
                <a href="/index.html" class="nav-link active"><i data-lucide="sparkles"></i> Home</a>
                <a href="/services.html" class="nav-link"><i data-lucide="scissors"></i> Services</a>
                <a href="/book.html" class="nav-link"><i data-lucide="calendar"></i> Book</a>
                <a href="/admin.html" class="nav-link"><i data-lucide="user-cog"></i> Admin</a>
            </div>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="hero-bg-shapes">
                <div class="shape shape-1"></div>
                <div class="shape shape-2"></div>
            </div>
            
            <div class="container hero-content">
                <span class="hero-subtitle reveal delay-1">Welcome to Luxury</span>
                <h1 class="hero-title reveal delay-2">
                    Discover Your True <br>
                    <span class="gradient-text">Radiance</span>
                </h1>
                <p class="hero-description reveal delay-3">
                    Experience world-class beauty treatments in an atmosphere of pure luxury. Our expert care is designed to rejuvenate your spirit and enhance your natural beauty.
                </p>
                <div class="btn-group reveal delay-3">
                    <a href="/book.html" class="btn btn-primary">Book Appointment</a>
                    <a href="/services.html" class="btn btn-outline">Explore Services</a>
                </div>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/main.js"></script>

</html>
