<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Services | Apsaras Ammu</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    
    <nav class="glass-nav">
        <div class="container nav-container">
            <a href="/index.html" class="logo">
                <i data-lucide="sparkles" class="gold-text"></i>
                APSARAS
            </a>
            <div class="nav-links">
                <a href="/index.html" class="nav-link"><i data-lucide="sparkles"></i> Home</a>
                <a href="/services.html" class="nav-link active"><i data-lucide="scissors"></i> Services</a>
                <a href="/book.html" class="nav-link"><i data-lucide="calendar"></i> Book</a>
                <a href="/admin.html" class="nav-link"><i data-lucide="user-cog"></i> Admin</a>
            </div>
        </div>
    </nav>

    <main>
        <div class="container" style="padding-top: 5rem; padding-bottom: 5rem;">
            <div class="section-header reveal">
                <span class="hero-subtitle">Our Menu</span>
                <h2 class="section-title">Premium <span class="gradient-text">Treatments</span></h2>
                <p class="hero-description">Explore our curated selection of high-end beauty services.</p>
            </div>

            <div id="loading" class="reveal" style="text-align: center; padding: 5rem;">
                <p class="gold-text" style="letter-spacing: 3px; text-transform: uppercase;">Curating your beauty menu...</p>
            </div>

            <div id="services-grid" class="service-grid">
                <!-- Dynamically injected -->
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('services-grid');
            const loading = document.getElementById('loading');

            fetch(`${API_BASE_URL}/api/services`)
                .then(res => res.json())
                .then(data => {
                    loading.style.display = 'none';
                    data.forEach((service, index) => {
                        const card = document.createElement('div');
                        card.className = `glass-panel service-card reveal delay-${(index % 3) + 1}`;
                        card.innerHTML = `
                            <i data-lucide="sparkles" class="service-icon"></i>
                            <h3 class="service-name">${service.name}</h3>
                            <div class="service-price">₹${service.price}</div>
                            <p class="service-description">${service.description}</p>
                            <div class="service-meta">
                                <span class="duration">
                                    <i data-lucide="clock" style="width: 14px;"></i>
                                    ${service.duration}
                                </span>
                                <a href="/book.html?serviceId=${service._id}" class="btn btn-outline" style="padding: 0.6rem 1.25rem; font-size: 0.75rem;">Book Now</a>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                    lucide.createIcons();
                })
                .catch(err => {
                    loading.innerHTML = '<p class="error-text">Failed to load services. Please refresh.</p>';
                });
        });
    </script>
</body>
</html>
