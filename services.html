<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Services - Apsaras Ammu</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .nav-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-main);
      font-weight: 400;
      border-bottom: 2px solid transparent;
      padding-bottom: 0.25rem;
      transition: all 0.3s ease;
    }
    .nav-link.active, .nav-link:hover {
      color: var(--accent-gold);
      border-bottom: 2px solid var(--accent-gold);
    }
    .service-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }
    .service-card {
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: transform 0.3s, border-color 0.3s;
    }
    .service-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent-gold);
    }
    .service-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 1rem;
    }
    .service-title {
      font-size: 1.5rem;
      margin: 0;
    }
    .service-price {
      color: var(--accent-gold);
      font-size: 1.25rem;
      font-weight: 600;
      display: flex;
      align-items: center;
    }
    .service-desc {
      color: var(--text-muted);
      flex: 1;
    }
    .service-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
    }
    .service-duration {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  
  <nav class="glass-nav">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; height: 80px;">
      <a href="/" style="display: flex; align-items: center; gap: 0.5rem; border: none;">
        <i data-lucide="sparkles" color="var(--accent-gold)" style="width: 28px; height: 28px;"></i>
        <h1 style="margin: 0; font-size: 1.5rem; letter-spacing: 1px; color: var(--text-main);">Apsaras</h1>
      </a>
      <div style="display: flex; gap: 2rem;">
        <a href="/index.html" class="nav-link"><i data-lucide="sparkles" style="width: 18px; height: 18px;"></i> Home</a>
        <a href="/services.html" class="nav-link"><i data-lucide="scissors" style="width: 18px; height: 18px;"></i> Services</a>
        <a href="/book.html" class="nav-link"><i data-lucide="calendar" style="width: 18px; height: 18px;"></i> Book</a>
        <a href="/admin.html" class="nav-link"><i data-lucide="user-cog" style="width: 18px; height: 18px;"></i> Admin</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="container animate-fade-in" style="padding: 4rem 2rem;">
      <div style="text-align: center; margin-bottom: 3rem;">
        <h2 style="font-size: 2.5rem; margin-bottom: 1rem;">Our <span style="color: var(--text-main);">Services</span></h2>
        <p style="color: var(--text-muted); max-width: 600px; margin: 0 auto;">
          Experience our curated selection of premium beauty treatments designed to enhance your natural radiance.
        </p>
      </div>

      <div id="loading" style="text-align: center; padding: 4rem; color: var(--accent-gold);">
        <p style="font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase;">Loading our luxurious treatments...</p>
      </div>

      <div id="error-message" style="display: none; text-align: center; color: var(--accent-rose); padding: 2rem;">
        Failed to load services. Please try again later.
      </div>

      <div class="service-grid" id="services-grid">
        <!-- Service cards will be injected here -->
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loadingEl = document.getElementById('loading');
      const errorEl = document.getElementById('error-message');
      const gridEl = document.getElementById('services-grid');

      fetch(`${API_BASE_URL}/api/services`)
        .then(res => {
          if (!res.ok) throw new Error('Network response was not ok');
          return res.json();
        })
        .then(data => {
          loadingEl.style.display = 'none';
          
          if (data.length === 0) {
            gridEl.innerHTML = '<p style="text-align: center; width: 100%; color: var(--text-muted);">No services available at the moment.</p>';
            return;
          }

          data.forEach(service => {
            const card = document.createElement('div');
            card.className = 'glass-panel service-card delay-100 animate-fade-in';
            card.innerHTML = `
              <div class="service-header">
                <h3 class="service-title">${service.name}</h3>
                <span class="service-price">
                  <i data-lucide="indian-rupee" style="width: 20px; height: 20px;"></i> ${service.price}
                </span>
              </div>
              <p class="service-desc">${service.description}</p>
              <div class="service-footer">
                <span class="service-duration">
                  <i data-lucide="clock" style="width: 16px; height: 16px;"></i>
                  ${service.duration}
                </span>
                <a href="/book?serviceId=${service._id}" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.9rem;">
                  Book Now
                </a>
              </div>
            `;
            gridEl.appendChild(card);
          });
          
          // Re-initialize icons for newly added HTML
          lucide.createIcons();
        })
        .catch(err => {
          console.error("Failed to fetch services:", err);
          loadingEl.style.display = 'none';
          errorEl.style.display = 'block';
        });
    });
  </script>
</body>
</html>
